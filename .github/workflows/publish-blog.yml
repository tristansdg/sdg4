name: Publish Blog Post

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.label.name == 'blog'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build blog post
        id: build
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/build-blog-post.js

      - name: Commit and push
        env:
          POST_TITLE: ${{ github.event.issue.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ blog.html
          git commit -m "publish blog post: $POST_TITLE"
          git push

      - name: Comment on issue and close
        uses: actions/github-script@v7
        env:
          SLUG: ${{ steps.build.outputs.slug }}
        with:
          script: |
            const slug = process.env.SLUG;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '**Blog post published!**',
                '',
                `Your post is now live at \`/blog/posts/${slug}\` — it will appear on the site within a minute or two once the deployment finishes.`,
                '',
                'This issue will now be closed automatically.'
              ].join('\n')
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
