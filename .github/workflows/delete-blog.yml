name: Delete Blog Post

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  delete:
    if: github.event.label.name == 'delete-blog'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Delete blog post
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/delete-blog-post.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ blog.html
          git commit -m "delete blog post from issue #${{ github.event.issue.number }}" || echo "Nothing to commit"
          git push

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Blog post has been deleted. The change will be live on the website within a minute or two.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
